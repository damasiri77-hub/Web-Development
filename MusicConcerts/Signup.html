<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
</head>
<body>
    
    <form style="text-align: center;">
        <p style="color: blue;">U don't have an account?</p>
    
    <h2>Signup</h2>
    <p><em>create an account by signing up.</em></p>

        <div>
        <label>First Name:<sup><span style="color: brown;">*</span></sup></label>
        <input placeholder="Ex:john" type="text" required>
        <br><br>
        <label>Last Name:<sup><span style="color: brown;">*</span></sup></label>
        <input placeholder="Ex:cooper" type="text" required>
        <br><br>
        <label>Email:<sup><span style="color: brown;">*</span></sup></label>
        <input placeholder="Ex:abc@xyz.com" type="email" required>
        <br><br>
        <label>Mobile Number:<sup><span style="color: brown;">*</span></sup></label>
        <input placeholder="Ex:1234567890" type="tel" required>
        <br><br>
        <label>OTP<sup><span style="color: brown;">*</span></sup></label>
        <input placeholder="OTP expires in 2 minutes" type="text" required>
        <br><br>
        <button style="background-color: blue; color:aliceblue">Create account</button>
        </div>
    </form>
</body>
</html>
