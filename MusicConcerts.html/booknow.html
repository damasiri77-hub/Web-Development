
    
    <!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>
</head>
<body>
    
<div style="text-align: center;">
    <h2>Complete the online payment to confirm your ticket booking.</h2>
    <h1>Payment Details</h1>

    <form >
        <label>Full Name:</label>
        <input type="text"  placeholder="enter your name" required><br><br>

        <label>Email:</label>
        <input type="email" placeholder="enter the valid email" required><br><br>

        <label>Card Number:</label>
        <input type="text" placeholder="enter the card number" required><br><br>

        <label>Expiry Date:</label>
        <input type="month" placeholder="enter expiry date" required><br><br>

        <label>CVV:</label>
        <input type="password" maxlength="3" placeholder="enter the CVV" required><br><br>

        <a href="payment.html"></a><button style="background-color: yellow; color: aliceblue;">\<input type="submit" value="Pay Now"></button></a>
    </form>
    </div>

</body>
</html>
